<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قضية هبة ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background-image:
linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)),
url("https://raw.githubusercontent.com/ssakora992-del/love-game/main/background.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.page{

display:none;
width:90%;
max-width:600px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(5px);
padding:25px;
border-radius:20px;
text-align:center;
animation:fade .5s;

}

.active{

display:block;

}

@keyframes fade{

from{
opacity:0;
transform:scale(.9);
}

to{
opacity:1;
transform:scale(1);
}

}

h2{

margin-bottom:20px;
font-size:30px;

}

p{

font-size:22px;
line-height:1.8;
margin-bottom:25px;

}

button{

padding:14px 28px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
margin:10px;
background:#2b6fff;
color:white;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.message{

margin-top:20px;
font-size:24px;
color:#ffb6d9;
font-weight:bold;

}

.heart{

font-size:70px;
cursor:pointer;
animation:pulse 1s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}

}

</style>

</head>

<body>

<div id="game">

<!-- الصفحات سنضيفها في الجزء الثاني -->

</div>

<script>

// الجافاسكريبت سنضيفه لاحقًا

</script>

</body>
</html>
